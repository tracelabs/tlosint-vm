<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace Labs — Investigation Workflow Guide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg:          #0d1117;
    --bg-raised:   #161b22;
    --bg-card:     #1c2130;
    --border:      #2a3347;
    --border-soft: #232b3a;

    --cyan:        #8fecb5;
    --cyan-dim:    rgba(143,236,181,0.12);
    --green:       #34d399;
    --green-dim:   rgba(52,211,153,0.12);
    --orange:      #fb923c;
    --orange-dim:  rgba(251,146,60,0.12);
    --purple:      #a78bfa;
    --purple-dim:  rgba(167,139,250,0.12);
    --red:         #f87171;
    --red-dim:     rgba(248,113,113,0.12);
    --yellow:      #fbbf24;
    --yellow-dim:  rgba(251,191,36,0.12);
    --blue:        #60a5fa;
    --blue-dim:    rgba(96,165,250,0.12);

    --text:        #e2e8f0;
    --text-2:      #8b9ab5;
    --text-3:      #4a5568;

    --radius:      8px;
    --shadow:      0 4px 16px rgba(0,0,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--bg-raised);
    border-bottom: 1px solid var(--border);
    padding: 24px 40px;
  }

  .header-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center;
    justify-content: space-between; gap: 20px; flex-wrap: wrap;
  }

  .logo-wrap { display: flex; align-items: center; gap: 14px; }

  .tl-mark {
    width: 40px; height: 40px;
    background: var(--cyan);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
    color: #0a1f14; letter-spacing: 0.5px;
    flex-shrink: 0;
    box-shadow: 0 0 16px rgba(143,236,181,0.25);
  }

  .logo-text h1 {
    font-size: 17px; font-weight: 700; color: var(--text);
    letter-spacing: -0.3px; line-height: 1.2;
  }

  .logo-text p { font-size: 12px; color: var(--text-2); margin-top: 2px; }

  .header-links {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }

  .nav-link {
    font-size: 12px; font-weight: 500;
    color: var(--text-2);
    text-decoration: none;
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    transition: all 0.15s;
  }
  .nav-link:hover { color: var(--cyan); border-color: var(--cyan); background: var(--cyan-dim); }
  .nav-link.active { color: var(--cyan); border-color: var(--cyan); background: var(--cyan-dim); font-weight: 600; }

  /* ── STICKY CONTROLS ── */
  .controls {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,17,23,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 40px;
  }

  .controls-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 11px;
  }

  .search-wrap { position: relative; }

  .search-icon {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-3); font-size: 15px; pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 14px;
    padding: 9px 14px 9px 36px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #search:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(143,236,181,0.1);
  }
  #search::placeholder { color: var(--text-3); }

  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }

  .filter-btn {
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 500;
    padding: 5px 13px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-dim); }
  .filter-btn.active { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-dim); font-weight: 600; }

  /* ── MAIN ── */
  main {
    max-width: 1200px; margin: 0 auto;
    padding: 32px 40px 64px;
  }

  #result-count {
    font-size: 13px; color: var(--text-2); margin-bottom: 28px;
  }
  #result-count strong { color: var(--cyan); font-weight: 600; }

  /* ── PIVOT CARD ── */
  .pivot-card {
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
    animation: rise 0.2s ease both;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .pivot-card:hover {
    border-color: var(--card-accent, var(--cyan));
    box-shadow: 0 0 0 1px var(--card-accent, var(--cyan)), 0 8px 24px rgba(0,0,0,0.3);
  }

  /* Card header — clickable toggle */
  .pivot-header {
    padding: 16px 20px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer;
    user-select: none;
  }

  .pivot-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  .pivot-title-group { flex: 1; }

  .pivot-title {
    font-size: 15px; font-weight: 600; color: var(--text);
    line-height: 1.2; margin-bottom: 3px;
  }

  .pivot-subtitle { font-size: 12px; color: var(--text-2); }

  .pivot-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .pivot-count {
    font-size: 11px; color: var(--text-3);
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 2px 9px;
  }

  .chevron {
    width: 18px; height: 18px; color: var(--text-3);
    transition: transform 0.2s;
  }
  .pivot-card.open .chevron { transform: rotate(90deg); }

  /* Card body */
  .pivot-body {
    display: none;
    border-top: 1px solid var(--border-soft);
    padding: 20px;
  }
  .pivot-card.open .pivot-body { display: block; }

  /* Section intro */
  .pivot-intro {
    font-size: 13px; color: var(--text-2); margin-bottom: 20px;
    line-height: 1.6;
  }

  /* Pivot steps grid */
  .pivot-steps {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }

  .step {
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 14px;
    transition: border-color 0.15s;
  }
  .step:hover { border-color: var(--step-color, var(--cyan)); }

  .step-label {
    display: flex; align-items: center; gap: 7px;
    margin-bottom: 8px;
  }

  .step-num {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--step-color, var(--cyan));
    color: #0a1f14;
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .step-title {
    font-size: 13px; font-weight: 600; color: var(--text);
  }

  .step-desc {
    font-size: 12px; color: var(--text-2); line-height: 1.6;
    margin-bottom: 10px;
  }

  /* Tool chips inside steps */
  .step-tools { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }

  .tool-chip {
    font-size: 11px; font-weight: 500;
    padding: 2px 9px; border-radius: 4px;
    border: 1px solid;
    text-decoration: none;
    transition: opacity 0.15s;
    cursor: default;
  }
  .tool-chip:hover { opacity: 0.75; }
  .chip-vm   { color: var(--cyan);   background: var(--cyan-dim);   border-color: rgba(143,236,181,0.2); }
  .chip-web  { color: var(--yellow); background: var(--yellow-dim); border-color: rgba(251,191,36,0.2); }
  .chip-tip  { color: var(--orange); background: var(--orange-dim); border-color: rgba(251,146,60,0.2); }

  .step-links { display: flex; flex-wrap: wrap; gap: 6px; }

  .step-link {
    font-size: 11px; color: var(--text-2);
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    transition: all 0.15s;
  }
  .step-link:hover { color: var(--cyan); border-color: rgba(143,236,181,0.3); background: var(--cyan-dim); }
  .step-link svg { width: 10px; height: 10px; opacity: 0.6; }

  /* Flag hint */
  .flag-hint {
    margin-top: 14px;
    background: rgba(143,236,181,0.05);
    border: 1px solid rgba(143,236,181,0.15);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px; color: #5aab7a; line-height: 1.6;
  }
  .flag-label {
    font-size: 10px; font-weight: 700; color: var(--cyan);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px;
  }

  /* ── EMPTY ── */
  #empty-state { text-align: center; padding: 80px 20px; display: none; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
  #empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
  #empty-state p  { font-size: 13px; color: var(--text-3); }

  /* ── HIGHLIGHT ── */
  mark {
    background: rgba(251,191,36,0.2);
    color: var(--yellow); border-radius: 2px; padding: 0 1px;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 18px 40px;
    text-align: center;
    font-size: 12px; color: var(--text-3);
  }
  footer a { color: var(--cyan); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    header, .controls, main, footer { padding-left: 16px; padding-right: 16px; }
    .pivot-steps { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-wrap">
      <div class="tl-mark">TL</div>
      <div class="logo-text">
        <h1>Investigation Workflow</h1>
        <p>Trace Labs OSINT VM — Pivot Guide</p>
      </div>
    </div>
    <div class="header-links">
      <a href="tl-tools.html" class="nav-link">🛠 Tool Reference</a>
      <a href="#" class="nav-link active">🔁 Workflows</a>
    </div>
  </div>
</header>

<div class="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Search by data type, technique, or tool…" autocomplete="off" spellcheck="false">
    </div>
    <div class="filter-row">
      <button class="filter-btn active" data-cat="All">All types</button>
      <button class="filter-btn" data-cat="Identity">👤 Identity</button>
      <button class="filter-btn" data-cat="Online Presence">🌐 Online Presence</button>
      <button class="filter-btn" data-cat="Contact Info">📞 Contact Info</button>
      <button class="filter-btn" data-cat="Location">📍 Location</button>
      <button class="filter-btn" data-cat="Media">🖼 Media</button>
      <button class="filter-btn" data-cat="Associates">🤝 Associates</button>
    </div>
  </div>
</div>

<main>
  <div id="result-count"></div>
  <div id="pivot-container"></div>
  <div id="empty-state">
    <div class="empty-icon">🔍</div>
    <h3>No workflows found</h3>
    <p>Try a different search term or clear the filter.</p>
  </div>
</main>

<footer>
  Trace Labs OSINT VM &nbsp;·&nbsp;
  <a href="https://www.tracelabs.org" target="_blank">tracelabs.org</a>
  &nbsp;·&nbsp;
  <a href="tl-tools.html">VM Tool Reference</a>
  &nbsp;·&nbsp; To add a workflow, edit the PIVOTS array in this file's source.
</footer>

<script>

// ============================================================
//  PIVOT DATABASE
//  Each entry = one data type you might have during an investigation.
//  "steps" = ordered pivot actions.
//  chip types: "vm" (VM tool), "web" (external resource), "tip" (advisory)
// ============================================================
const PIVOTS = [

  // ─────────────────────────────────────────────────────────
  {
    id: "name",
    category: "Identity",
    icon: "👤",
    color: "#8fecb5",
    title: "Full Name",
    subtitle: "You have a person's real name — first, last, or both",

      {
        num: 1,
        title: "Search Google with operators",
        desc: "Start broad, then add context to isolate the right person. Combine name with city, school, employer, or hobby.",

        links: [
          { label: "Google Operators Cheatsheet", url: "https://ahrefs.com/blog/google-advanced-search-operators/" }
        ]
      },
      {
        num: 2,

        desc: "Search Facebook, LinkedIn, Instagram, TikTok, and X directly — Google doesn't always index private profiles.",
        tools: [{ label: "Facebook", type: "web" }, { label: "LinkedIn", type: "web" }, { label: "Instagram", type: "web" }],
        links: [
          { label: "Facebook People Search", url: "https://www.facebook.com/people-search" }
        ]
      },
      {
        num: 3,
        title: "People aggregator sites",
        desc: "Run the name through aggregators to surface addresses, relatives, phone numbers, and age data.",
        tools: [{ label: "TruthFinder", type: "web" }, { label: "Spokeo", type: "web" }, { label: "Intelius", type: "web" }],
        links: [
          { label: "IntelTechniques People Search", url: "https://inteltechniques.com/tools/People.html" }
        ]
      },
      {
        num: 4,
        title: "Reverse image search for the person",
        desc: "If you have a photo, run reverse image searches to find other profiles or appearances.",
        tools: [{ label: "PimEyes", type: "web" }, { label: "Google Lens", type: "web" }, { label: "TinEye", type: "web" }],
        links: []
      }
    ],
    flagHint: "Potential TL flags: current/last known location, social media profiles, employer, associates, vehicle."
  },

  // ─────────────────────────────────────────────────────────
  {
    id: "username",
    category: "Online Presence",
    icon: "🔑",
    color: "#34d399",
    title: "Username / Handle",
    subtitle: "You have a username or alias used on any platform",
    intro: "Usernames are one of the most powerful pivots in missing person cases — people reuse handles across platforms without realizing it creates a cross-platform identity trail. Even slight variations (adding numbers, underscores) are worth checking.",
    steps: [
      {
        num: 1,
        title: "Run Sherlock across 300+ platforms",
        desc: "The fastest way to find all accounts using this exact username. Save the output and check each hit manually.",
        tools: [{ label: "Sherlock", type: "vm" }],

      },
      {

        tools: [{ label: "Sherlock", type: "vm" }, { label: "WhatsMyName", type: "web" }],
        links: [{ label: "WhatsMyName", url: "https://whatsmyname.app" }]
      },
      {
        num: 3,
        title: "Search the username as a keyword",

        tools: [{ label: "Google", type: "web" }],
        links: []

      {
        num: 4,

        links: [{ label: "OSINT Framework — Username", url: "https://osintframework.com/" }]
      }
    ],
    flagHint: "Potential TL flags: new/active social profiles, username on dark web forums, linked email addresses, location hints in bio or posts."
  },

  // ─────────────────────────────────────────────────────────

    id: "email",
    category: "Contact Info",
    icon: "✉️",

  {

// ── Category config ──────────────────────────────────────────
const CAT_FILTERS = ["All","Identity","Online Presence","Contact Info","Location","Media","Associates"];

let activeFilter = "All";
let searchTerm   = "";

// ── Helpers ──────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hl(str, term) {
  if (!term) return esc(str);
  const re = new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return esc(str).replace(re, m=>`<mark>${m}</mark>`);
}

function matchesTerm(p, term) {
  if (!term) return true;
  const t = term.toLowerCase();
  if (p.title.toLowerCase().includes(t)) return true;
  if (p.subtitle.toLowerCase().includes(t)) return true;
  if (p.intro.toLowerCase().includes(t)) return true;
  if (p.category.toLowerCase().includes(t)) return true;
  for (const s of p.steps) {
    if (s.title.toLowerCase().includes(t)) return true;
    if (s.desc.toLowerCase().includes(t)) return true;
    for (const tl of (s.tools||[])) if (tl.label.toLowerCase().includes(t)) return true;
    for (const lk of (s.links||[])) if (lk.label.toLowerCase().includes(t)) return true;
  }
  return false;
}

// ── Render ───────────────────────────────────────────────────
function render() {
  const container  = document.getElementById('pivot-container');
  const emptyState = document.getElementById('empty-state');
  const term       = searchTerm.toLowerCase();

  const filtered = PIVOTS.filter(p => {
    if (activeFilter !== "All" && p.category !== activeFilter) return false;
    return matchesTerm(p, term);
  });

  document.getElementById('result-count').innerHTML = term
    ? `Showing <strong>${filtered.length}</strong> workflow${filtered.length!==1?'s':''} for "<strong>${esc(searchTerm)}</strong>"`
    : `<strong>${filtered.length}</strong> workflow${filtered.length!==1?'s':''} — click any card to expand`;

  if (!filtered.length) {
    container.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }
  emptyState.style.display = 'none';

  container.innerHTML = filtered.map(p => cardHtml(p, term)).join('');

  // Restore open states
  container.querySelectorAll('.pivot-card').forEach(el => {
    el.querySelector('.pivot-header').addEventListener('click', () => {
      el.classList.toggle('open');
    });
  });
}

function chipHtml(tool) {
  const cls = tool.type === 'vm' ? 'chip-vm' : tool.type === 'web' ? 'chip-web' : 'chip-tip';
  return `<span class="tool-chip ${cls}">${esc(tool.label)}</span>`;
}

const EXT_ICON = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1v-3M10 2h4m0 0v4m0-4L7 9"/></svg>`;

function cardHtml(p, term) {
  const stepsHtml = p.steps.map(s => {
    const tools  = (s.tools||[]).map(chipHtml).join('');
    const links  = (s.links||[]).map(l => `<a class="step-link" href="${esc(l.url)}" target="_blank">${EXT_ICON}${hl(l.label,term)}</a>`).join('');
    return `
    <div class="step" style="--step-color:${p.color}">
      <div class="step-label">
        <div class="step-num" style="background:${p.color}">${s.num}</div>
        <div class="step-title">${hl(s.title,term)}</div>
      </div>
      <div class="step-desc">${hl(s.desc,term)}</div>
      ${tools ? `<div class="step-tools">${tools}</div>` : ''}
      ${links ? `<div class="step-links">${links}</div>` : ''}
    </div>`;
  }).join('');

  const flagHtml = p.flagHint ? `
    <div class="flag-hint">
      <div class="flag-label">🚩 Flag Opportunities</div>
      ${esc(p.flagHint)}
    </div>` : '';

  return `
  <div class="pivot-card" style="--card-accent:${p.color}" id="card-${p.id}">
    <div class="pivot-header">
      <div class="pivot-icon" style="background:${p.color}20; border:1px solid ${p.color}30">${p.icon}</div>
      <div class="pivot-title-group">
        <div class="pivot-title">${hl(p.title,term)}</div>
        <div class="pivot-subtitle">${hl(p.subtitle,term)}</div>
      </div>
      <div class="pivot-meta">
        <div class="pivot-count">${p.steps.length} pivots</div>
        <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M6 4l4 4-4 4"/>
        </svg>
      </div>
    </div>
    <div class="pivot-body">
      <p class="pivot-intro">${hl(p.intro,term)}</p>
      <div class="pivot-steps">${stepsHtml}</div>
      ${flagHtml}
    </div>
  </div>`;
}

// ── Legend ───────────────────────────────────────────────────
// Inject a small chip legend before the result count
const legendHtml = `
<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;font-size:12px;color:var(--text-2)">
  <span style="opacity:0.6">Chip key:</span>
  <span class="tool-chip chip-vm">VM Tool</span>
  <span class="tool-chip chip-web">External Resource</span>
</div>`;

document.querySelector('main').insertAdjacentHTML('afterbegin', legendHtml);

// ── Init ─────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    render();
  });
});

render();
</script>
